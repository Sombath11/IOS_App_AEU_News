<ion-content class="forgot-password-content">
  <div class="forgot-password-container">
    <!-- Header Section -->
    <div class="header-section">
      <ion-button fill="clear" class="back-btn" (click)="goBack()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
      <div class="icon-wrapper">
          <img src="../../../../assets/logo.png" alt="">
      </div>
      <h1 class="page-title">Forgot Password?</h1>
      <p class="page-subtitle">Enter your email to reset your password</p>
    </div>

    <!-- Forgot Password Form -->
    <div class="form-section">
      <form (ngSubmit)="onSubmit()">
        <!-- Email Field -->
        <div class="input-wrapper">
          <label class="input-label">Email Address</label>
          <ion-item class="input-item" lines="none">
            <ion-icon slot="start" name="mail-outline" class="input-icon"></ion-icon>
            <ion-input
              [(ngModel)]="email"
              name="email"
              placeholder="student@university.edu"
              type="email"
              required>
            </ion-input>
          </ion-item>
        </div>

        <p class="help-text">
          We'll send you a link to reset your password
        </p>

        <!-- Submit Button -->
        <ion-button expand="block" type="submit" class="submit-btn">
          Send Reset Link
        </ion-button>
      </form>

      <!-- Back to Login -->
      <div class="back-to-login">
        <p class="back-text">Remember your password?</p>
        <a class="back-link" (click)="navigateToLogin()">
          Back to Login
        </a>
      </div>
    </div>
  </div>
</ion-content>
