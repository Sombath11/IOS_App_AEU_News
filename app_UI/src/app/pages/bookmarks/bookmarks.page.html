<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>My Bookmarks</ion-title>
    <ion-buttons slot="end"> 
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="bookmarks-content">
  <div class="bookmarks-container">
    @if (bookmarks.length > 0) {
      <div class="bookmarks-list">
        @for (bookmark of bookmarks; track bookmark.id) {
          <div class="bookmark-card" (click)="viewBookmark(bookmark)">
            <div class="bookmark-icon" [ngClass]="bookmark.type">
              <ion-icon [name]="bookmark.icon"></ion-icon>
            </div>
            <div class="bookmark-content">
              <h3 class="bookmark-title">{{ bookmark.title }}</h3>
              <p class="bookmark-excerpt">{{ bookmark.excerpt }}</p>
              <div class="bookmark-meta">
                <span class="bookmark-category">{{ bookmark.category }}</span>
                <span class="bookmark-date">{{ bookmark.date }}</span>
              </div>
            </div>
            <ion-icon name="chevron-forward" class="chevron"></ion-icon>
          </div>
        }
      </div>
    } @else {
      <div class="empty-state">
        <div class="empty-icon">
          <ion-icon name="bookmark-outline"></ion-icon>
        </div>
        <h3>No Bookmarks Yet</h3>
        <p>Save articles and events to access them quickly</p>
        <ion-button expand="block" class="browse-btn" (click)="browseContent()">
          Browse Content
        </ion-button>
      </div>
    }
  </div>
</ion-content>
