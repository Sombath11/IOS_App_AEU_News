<ion-header class="events-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon slot="icon-only" name="chevron-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>University Events</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="goToSearch()">
        <ion-icon slot="icon-only" name="search-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="events-content">
  <!-- Today's Events Section -->
  <div class="events-section">
    <div class="section-header">
      <h2 class="section-title">{{ todayDate }}</h2>
      <p class="section-subtitle">{{ todayEvents.length }} events scheduled</p>
    </div>

    <div class="timeline-container">
      <div class="timeline-line"></div>
      
      <div class="event-card" *ngFor="let event of todayEvents" (click)="viewEventDetail(event)">
        <div class="timeline-icon" [style.background]="getIconColor(event.category)">
          <ion-icon 
            [name]="event.icon === 'school' ? 'school-outline' : event.icon === 'people' ? 'people-outline' : 'briefcase-outline'">
          </ion-icon>
        </div>
        
        <div class="event-details">
          <div class="event-time-row">
            <span class="event-time" [style.color]="getIconColor(event.category)">{{ event.time }}</span>
            <ion-chip class="category-chip" [ngStyle]="{'background': getCategoryColor(event.category).background, 'color': getCategoryColor(event.category).color}">
              {{ event.category }}
            </ion-chip>
          </div>
          
          <h3 class="event-title">{{ event.title }}</h3>
          
          <p class="event-location">
            <ion-icon name="location-outline" size="small"></ion-icon>
            {{ event.location }}
          </p>
          
          <div class="event-actions">
            <ion-button fill="outline" class="action-btn view-btn" (click)="viewDetails(event, $event)">
              View Details
            </ion-button>
            <ion-button fill="solid" class="action-btn primary" (click)="registerNow(event, $event)">
              Register Now
            </ion-button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tomorrow's Events Section -->
  <div class="events-section tomorrow-section">
    <div class="section-header">
      <h2 class="section-title">{{ tomorrowDate }}</h2>
    </div>

    <div class="empty-state" *ngIf="tomorrowEvents.length === 0">
      <div class="empty-icon-wrapper">
        <ion-icon name="calendar-outline"></ion-icon>
      </div>
      <h3>No events scheduled yet</h3>
      <p>Check back later or browse other dates</p>
    </div>
  </div>
</ion-content>
