<ion-content class="splash-content">
  <div class="splash-container">
    <!-- Patterned Blue Background -->
    <div class="background-pattern"></div>
    
    <!-- Logo and Brand Section -->
    <div class="brand-section">
      <div class="logo-container">
        <!-- AEU Logo -->
        <img src="../../../assets/logo.png" alt="AEU Logo" class="aeu-logo">
      </div>
      <h1 class="app-title">AEU News</h1>
      <p class="app-subtitle">Asia Euro University</p>
      <p class="app-tagline">Your Gateway to Academic Excellence</p>
    </div>
    
    <!-- Get Started Button -->
    <div class="action-section">
      <ion-button 
        expand="block" 
        class="get-started-btn"
        (click)="navigateToOnboarding()">
        Get Started
      </ion-button>
    </div>
  </div>
</ion-content>
